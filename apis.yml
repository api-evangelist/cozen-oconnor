- aid: cozen-oconnor:blog-network
  name: Cozen O'Connor LexBlog / WordPress Blog Network
  description: >-
    Cozen O'Connor publishes an unusually broad network of practice-area
    blogs and podcasts hosted on LexBlog / WordPress infrastructure. Each
    blog is reachable at its own domain and exposes a standard WordPress
    RSS 2.0 feed at `/feed/`, providing a programmatic surface that the
    corporate cozen.com domain does not. This is the closest thing to a
    machine-readable API the firm provides, and it is what makes the firm
    indexable by news aggregators, LLM crawlers, and downstream
    thought-leadership pipelines. Topics span subrogation, cyber and data
    law, health law, state attorneys general, AI and emerging tech, OSHA
    enforcement, employment law, family law, real estate / land use,
    property and casualty insurance coverage, and legal-profession
    responsibility.
