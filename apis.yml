aid: cozen-oconnor
name: Cozen O'Connor
description: >-
  Cozen O'Connor is a full-service U.S. law firm founded in 1970 and
  headquartered in Philadelphia, with more than 1,000 attorneys across 33+
  offices in the United States, Canada, and the United Kingdom. The firm is
  ranked among the top 100 law firms in America and is best known for its
  nationally recognized subrogation, insurance, labor and employment, global
  corporate, intellectual property, and government relations practices. Cozen
  O'Connor Public Strategies, the firm's bipartisan federal, state, and local
  government affairs and lobbying arm, operates from Washington, D.C. and
  major state capitals. The firm operates an unusually broad thought-leadership
  network of LexBlog/WordPress-powered blogs and podcasts (subrogation, cyber
  law, health law, state AGs, transformative AI, OSHA, employment law, family
  law, property insurance, casualty coverage, real estate / land use,
  professional responsibility, and a Public Strategies feed), each of which
  exposes a standard `/feed/` RSS endpoint. Cozen O'Connor does not operate a
  public developer program, REST/GraphQL API, SDK ecosystem, or GitHub
  organization. This profile catalogs the firm's public-facing knowledge
  surface — practice and industry pages, attorney directory, ancillary
  businesses, lobbying arm, and the blog/podcast RSS network — rather than a
  developer platform.
