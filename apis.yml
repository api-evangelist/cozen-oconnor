- aid: cozen-oconnor:public-strategies
  name: Cozen O'Connor Public Strategies
  description: >-
    Cozen O'Connor Public Strategies (copublicstrategies.com) is the firm's
    bipartisan government affairs and lobbying arm, representing
    corporations, nonprofits, trade associations, and individuals before
    federal, state, and local governments. Service lines include federal
    lobbying, state and local lobbying, strategic communications and
    reputation management, procurements/grants/loans support, policy
    monitoring and analysis, and a national State Attorneys General
    practice. Public Strategies maintains a primary office at 2001 M
    Street NW, Suite 500, Washington, DC, with practitioners in major
    state capitals. It publishes the Beltway Briefing Podcast and a
    practice-wide WordPress site exposing a public RSS feed at
    `/feed/`. Public Strategies does not expose a developer API; lobbying
    activity is reportable through the Senate Lobbying Disclosure Act
    filing system.
