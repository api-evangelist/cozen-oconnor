  description: >-
    The Cozen O'Connor public website at cozen.com is the firm's primary
    external knowledge surface, organizing attorney biographies, practice
    and industry pages, office locations, news and publications, alerts,
    newsletters, ancillary-business descriptions, and recruiting content.
    The site enumerates the firm's positioning — "In an industry built on
    talk, we've made our name by doing." — and does not expose any public
    API, OpenAPI specification, GraphQL endpoint, or developer portal.
